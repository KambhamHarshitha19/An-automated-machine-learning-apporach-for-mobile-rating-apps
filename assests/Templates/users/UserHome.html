{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<title>POSE DETECTION</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{% static 'css/w3.css' %}">
<link rel="stylesheet" href="{% static 'css/family.css' %}">
<link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
<style>
body {
    font-family: "Lato", sans-serif;
    background-color: #f1f1f1;
    margin: 0;
    padding: 0;
}

/* Navbar Styling */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: black;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
}

.navbar img {
    height: 50px;
    width: 70px;
}

.navbar a {
    color: white;
    text-decoration: none;
    padding: 10px 15px;
    font-size: 16px;
    text-transform: uppercase;
}

.navbar a:hover {
    background-color: red;
    color: white;
    border-radius: 5px;
}

/* Page Container */
.container {
    display: flex;
    height: 100vh;
    margin-top: 60px; /* To prevent content from overlapping with navbar */
}

/* Left section with background image */
.left-section {
    flex: 1;
    background: url("{% static 'images/t.webp' %}") no-repeat center center/cover;
    position: relative;
}

/* Optional: Overlay effect on background */
.left-section::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4); /* Dark overlay */
}

/* Right section with white background */
.right-section {
    flex: 1;
    background-color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .container {
        flex-direction: column;
    }
    
    .left-section {
        height: 50vh;
    }

    .right-section {
        height: 50vh;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <img src="{% static 'images/po.png' %}" alt="Logo">
    <div>
        <a href="{% url 'UserHome' %}">{{ user }}</a>
        <a href="{% url 'UserHome' %}">HOME</a>
        <a href="{% url 'Datasetview' %}">DATASET</a>
        <a href="{% url 'training' %}">TRAINING</a>
        <a href="{% url 'predict' %}">RATE</a>
        <a href="{% url 'base' %}">LOGOUT</a>
    </div>
</div>

<!-- Page Content -->
<div class="container">
    <!-- Left Section with Background Image -->
    <div class="left-section">
        <!-- You can add content inside if needed -->
    </div>

    <!-- Right Section with Content -->
    <div class="right-section">
        <h2 class="w3-wide w3-animate-opacity">Rating of Mobile Apps</h2>
        <marquee behavior="alternate" direction="left">
            <h1>Welcome <span style="color: red; text-transform: uppercase;"><b>{{ user }}</b></span></h1>
        </marquee>
        <h2>Your Email: <span style="color:black;"><b>{{ email }}</b></span></h2>
        <h2>Phone Number: <span style="color:black;"><b>{{ phone }}</b></span></h2>
    </div>
</div>

</body>
</html>
