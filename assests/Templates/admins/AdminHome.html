{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<title>POSE DETECTION</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{% static 'css/w3.css' %}">
<link rel="stylesheet" href="{% static 'css/family.css' %}">
<link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
<style>
body {
    font-family: "Lato", sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f5f5f5; /* Fallback color */
}

/* Container for splitting screen */
.container {
    display: flex;
    width: 100%;
    height: 100vh;
}

/* Left side with background image */
.left-side {
    flex: 1;
    background-image: url("{% static 'images/t.webp' %}");
    background-size: cover;
    background-position: center;
}

/* Right side with content */
.right-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    background-color: white; /* Set background for content */
}

/* Footer */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background-color: #f1f1f1;
    box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
    text-align: center;
    padding: 8px;
}
</style>
</head>
<body>

<div class="container">
    <!-- Left Side (Background Image) -->
    <div class="left-side"></div>

    <!-- Right Side (Content) -->
    <div class="right-side">
        <h2 class="w3-wide w3-animate-opacity w3-round-xxlarge">Rating of Mobile Apps</h2>
        <h1>Welcome to Admin Home</h1>
        <a href="{% url 'AdminHome' %}" class="w3-button w3-black w3-hover-red">HOME</a>
        <br>
        <a href="{% url 'viewusers' %}" class="w3-button w3-black w3-hover-red">USER LIST</a>
        <br>
        <a href="{% url 'base' %}" class="w3-button w3-black w3-hover-red">LOGOUT</a>
    </div>
</div>



</body>
</html>
